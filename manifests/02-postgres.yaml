apiVersion: v1
kind: PersistentVolumeClaim
metadata: 
 name: postgres-pvc
 namespace: fhir-lab
spec: 
 accessModes: 
   - ReadWriteOnce 
 storageClassName: local-path
 resources:
   requests:
     storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata: 
 name: postgres
 namespace: fhir-lab
spec: 
 replicas: 1
 selector: 
   matchLabels: 
     app: postgres 
 template: 
   metadata: 
     labels: 
       app: postgres 
   spec: 
     containers:
       - name: postgres 
         image: docker.io/library/postgres:15
         ports: 
           - containerPort: 5432
         envFrom: 
           - secretRef: 
               name: postgres-secret
         volumeMounts: 
           - name: data
             mountPath: /var/lib/postgresql/data
     volumes:
       - name: data
         persistentVolumeClaim:
           claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata: 
 name: postgres
 namespace: fhir-lab
spec: 
 selector: 
   app: postgres
 ports: 
   - port: 5432
     targetPort: 5432
